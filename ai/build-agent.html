        <script src="plugin/markdown/markdown.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealMarkdown ]
			}).then(() => {
				mermaid.initialize({ startOnLoad: false, theme: 'dark' });
				document.querySelectorAll('code.language-mermaid, code.mermaid').forEach(async (el, i) => {
					const pre = el.parentElement;
					const container = document.createElement('div');
					container.classList.add('mermaid');
					const { svg } = await mermaid.render(`mermaid-${i}`, el.textContent.trim());
					container.innerHTML = svg;
					pre.parentElement.replaceChild(container, pre);
				});
			});
            Reveal.configure({
                keyboard: {
                    39: 'next',
                    37: 'prev',
                }
            });
		</script>
